<style>

<body class="bg-mesh min-h-screen flex flex-col font-body text-on-surface overflow-x-hidden selection:bg-tertiary/30">

<!-- Navbar -->

<!-- Main Content -->
<main class="flex-grow flex items-center justify-center px-4 py-24">
  <div class="w-full max-w-[420px] glass-panel rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col gap-6 border border-outline-variant/10">

    <!-- Auth Header -->
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center p-3 rounded-2xl bg-primary-container/20 text-primary mb-4">
        <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1;">menu_book</span>
      </div>
      <h1 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface">📚 Smart Notes</h1>
      <p class="text-on-surface-variant font-medium text-sm">AI-Powered Academic Assistant</p>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="hidden flex items-center gap-3 p-4 rounded-xl bg-error-container/20 text-error border border-error/20 text-sm">
      <span class="material-symbols-outlined">error</span>
      <span id="error-text"></span>
    </div>

    <!-- Success Message -->
    <div id="success-message" class="hidden flex items-center gap-3 p-4 rounded-xl bg-green-900/20 text-green-400 border border-green-800/20 text-sm">
      <span class="material-symbols-outlined">check_circle</span>
      <span id="success-text"></span>
    </div>

    <!-- Login Form (shown by default) -->
    <form class="flex flex-col gap-5" id="login-form">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-tertiary ml-1" for="login-email">Email:</label>
        <div class="group relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
          <input id="login-email" class="w-full bg-surface-container-low/50 border border-outline-variant/20 rounded-2xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" placeholder="your@email.com" type="email" required/>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-tertiary ml-1" for="login-password">Password:</label>
        <div class="group relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
          <input id="login-password" class="w-full bg-surface-container-low/50 border border-outline-variant/20 rounded-2xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" placeholder="••••••••" type="password" required/>
        </div>
      </div>
      <button id="login-btn" class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-headline font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all duration-300 mt-2" type="submit">
        Login
      </button>
    </form>

    <!-- Signup Form (hidden by default) -->
    <form class="flex flex-col gap-5 hidden" id="signup-form">
      <div class="space-y-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-tertiary ml-1" for="signup-email">Email:</label>
        <div class="group relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
          <input id="signup-email" class="w-full bg-surface-container-low/50 border border-outline-variant/20 rounded-2xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" placeholder="your@email.com" type="email" required/>
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold uppercase tracking-widest text-tertiary ml-1" for="signup-password">Password:</label>
        <div class="group relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
          <input id="signup-password" class="w-full bg-surface-container-low/50 border border-outline-variant/20 rounded-2xl py-3.5 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300" placeholder="••••••••" type="password" required/>
        </div>
      </div>
      <button id="signup-btn" class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-headline font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all duration-300 mt-2" type="submit">
        Sign Up
      </button>
    </form>

    <!-- OTP Verification Form (hidden) -->
    <form class="flex flex-col gap-6 hidden" id="otp-form">
      <div class="text-center space-y-2">
        <h2 class="text-lg font-headline font-bold text-on-surface">Enter OTP</h2>
        <p class="text-sm text-on-surface-variant">Please enter the verification code sent to your email</p>
      </div>
      <div class="flex justify-between gap-2">
        <input class="otp-input w-12 h-14 bg-surface-container-high border border-outline-variant/30 rounded-xl text-center text-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface" maxlength="1" type="text" required/>
        <input class="otp-input w-12 h-14 bg-surface-container-high border border-outline-variant/30 rounded-xl text-center text-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface" maxlength="1" type="text" required/>
        <input class="otp-input w-12 h-14 bg-surface-container-high border border-outline-variant/30 rounded-xl text-center text-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface" maxlength="1" type="text" required/>
        <input class="otp-input w-12 h-14 bg-surface-container-high border border-outline-variant/30 rounded-xl text-center text-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface" maxlength="1" type="text" required/>
        <input class="otp-input w-12 h-14 bg-surface-container-high border border-outline-variant/30 rounded-xl text-center text-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface" maxlength="1" type="text" required/>
        <input class="otp-input w-12 h-14 bg-surface-container-high border border-outline-variant/30 rounded-xl text-center text-xl font-bold focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all text-on-surface" maxlength="1" type="text" required/>
      </div>
      <div class="flex flex-col gap-3">
        <button id="verify-otp-btn" class="w-full bg-gradient-to-r from-primary-container to-primary text-on-primary font-headline font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 hover:brightness-110 active:scale-95 transition-all" type="submit">
          Verify OTP
        </button>
        <button id="resend-otp-btn" class="w-full bg-white/5 border border-primary/30 text-primary font-headline font-bold py-4 rounded-2xl hover:bg-white/10 transition-all" type="button">
          Resend OTP
        </button>
      </div>
    </form>

    <!-- Toggle & Back Link -->
    <div class="flex flex-col items-center gap-4 pt-2">
      <button class="text-sm text-tertiary-fixed-dim hover:text-primary transition-colors duration-200" id="toggle-link">
        <span id="toggle-text">Don't have an account? </span><span id="toggle-action" class="font-semibold">Sign up here</span>
      </button>
      <div class="h-px w-16 bg-outline-variant/20"></div>
      <a class="inline-flex items-center gap-2 text-xs text-on-surface-variant hover:text-on-surface transition-colors no-underline" href="/">

<!-- Footer -->
<footer class="fixed bottom-0 w-full flex justify-between items-center px-12 py-4 bg-transparent text-[#7189f6] font-inter text-xs uppercase tracking-widest">

  </div>

<!-- Background Decoration -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-20%] left-[-10%] w-[600px] h-[600px] bg-tertiary/5 rounded-full blur-[150px] pointer-events-none"></div>

<script>
  let isLoginForm = true;
  let countdownInterval = null;

  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const otpForm = document.getElementById('otp-form');
  const toggleLink = document.getElementById('toggle-link');
  const toggleText = document.getElementById('toggle-text');
  const toggleAction = document.getElementById('toggle-action');

  // Toggle between login and signup
  toggleLink.addEventListener('click', () => {
    isLoginForm = !isLoginForm;
    loginForm.classList.add('hidden');
    signupForm.classList.add('hidden');
    otpForm.classList.add('hidden');
    if (isLoginForm) {
      loginForm.classList.remove('hidden');
      toggleText.textContent = "Don't have an account? ";
      toggleAction.textContent = 'Sign up here';
    } else {
      signupForm.classList.remove('hidden');
      toggleText.textContent = "Already have an account? ";
      toggleAction.textContent = 'Login here';
    }
  });

  // Handle login
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const loginBtn = document.getElementById('login-btn');

    hideMessages();
    if (!email || !password) { showError('Please enter both email and password'); return; }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showSuccess('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
      } else {
        if (data.error && data.error.toLowerCase().includes('password')) {
          showError('Incorrect password. Please try again.');
        } else if (data.error && data.error.toLowerCase().includes('email')) {
          showError('Email not found. Please check your email or sign up.');
        } else {
          showError(data.error || 'Login failed. Please check your credentials.');
        }
      }
    } catch (error) {
      showError('Network error. Please check your connection and try again.');
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Login';
    }
  });

  // Handle signup
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const signupBtn = document.getElementById('signup-btn');
    const resendBtn = document.getElementById('resend-otp-btn');

    hideMessages();
    if (!email || !password) { showError('Please fill in all fields'); return; }

    signupBtn.disabled = true;
    signupBtn.textContent = 'Sending OTP...';
    resendBtn.disabled = true;

    try {
      const response = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (response.ok) {
        showSuccess('OTP sent to your email!');
        loginForm.classList.add('hidden');
        signupForm.classList.add('hidden');
        otpForm.classList.remove('hidden');
        const firstOtpInput = document.querySelector('.otp-input');
        if (firstOtpInput) firstOtpInput.focus();
        startCountdown(50);
      } else {
        showError(data.error || 'Failed to send OTP');
        resendBtn.disabled = false;
      }
    } catch (error) {
      showError('Network error. Please try again.');
      resendBtn.disabled = false;
    } finally {
      signupBtn.disabled = false;
      signupBtn.textContent = 'Sign Up';
    }
  });

  // Handle OTP input auto-advance
  const otpInputs = document.querySelectorAll('.otp-input');
  otpInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      const value = e.target.value;
      if (/^[0-9]$/.test(value)) {
        if (index < otpInputs.length - 1) otpInputs[index + 1].focus();
      } else if (value === '' && e.inputType === 'deleteContentBackward') {
        if (index > 0) otpInputs[index - 1].focus();
      } else {
        e.target.value = '';
      }
    });
  });

  // Handle OTP verification
  otpForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const otpValues = Array.from(otpInputs).map(input => input.value);
    const otp = otpValues.join('');
    const verifyBtn = document.getElementById('verify-otp-btn');

    verifyBtn.disabled = true;
    verifyBtn.textContent = 'Verifying...';

    try {
      const response = await fetch('/api/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ otp })
      });
      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showSuccess('Account verified successfully! Redirecting...');
        setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
      } else {
        showError(data.error || 'Invalid OTP');
      }
    } catch (error) {
      showError('Network error. Please try again.');
    }

    verifyBtn.disabled = false;
    verifyBtn.textContent = 'Verify OTP';
  });

  // Handle resend OTP
  document.getElementById('resend-otp-btn').addEventListener('click', async () => {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const resendBtn = document.getElementById('resend-otp-btn');

    if (!resendBtn.disabled) {
      resendBtn.disabled = true;
      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
          showSuccess('New OTP sent to your email!');
          otpInputs.forEach(input => input.value = '');
          otpInputs[0].focus();
          startCountdown(50);
        } else {
          showError(data.error || 'Failed to resend OTP');
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend OTP';
        }
      } catch (error) {
        showError('Network error. Please try again.');
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend OTP';
      }
    }
  });

  function startCountdown(seconds) {
    const resendBtn = document.getElementById('resend-otp-btn');
    let timeLeft = seconds;
    if (countdownInterval) clearInterval(countdownInterval);
    resendBtn.textContent = `Resend OTP (${timeLeft}s)`;
    resendBtn.disabled = true;
    countdownInterval = setInterval(() => {
      timeLeft--;
      resendBtn.textContent = `Resend OTP (${timeLeft}s)`;
      if (timeLeft <= 0) {
        clearInterval(countdownInterval);
        resendBtn.disabled = false;
        resendBtn.textContent = 'Resend OTP';
        countdownInterval = null;
      }
    }, 1000);
  }

  function hideMessages() {
    document.getElementById('error-message').classList.add('hidden');
    document.getElementById('success-message').classList.add('hidden');
  }

  function showError(message) {
    const el = document.getElementById('error-message');
    document.getElementById('error-text').textContent = message;
    el.classList.remove('hidden');
    el.classList.add('flex');
    setTimeout(() => {
      el.classList.add('hidden');
      el.classList.remove('flex');
    }, 5000);
  }

  function showSuccess(message) {
    const el = document.getElementById('success-message');
    document.getElementById('success-text').textContent = message;
    el.classList.remove('hidden');
    el.classList.add('flex');
    setTimeout(() => {
      el.classList.add('hidden');
      el.classList.remove('flex');
    }, 5000);
  }

  // Redirect if already logged in
  if (localStorage.getItem('token')) {
    window.location.href = '/dashboard';
  }
</script>
</body>
</html>
